<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign In | SafeNav</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SafeNav">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    <link rel="icon" href="assets/icon-192.png" type="image/png">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <link rel="stylesheet" href="css/planner.css">
    <link rel="stylesheet" href="css/auth.css">

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script> 
    <script src="js/firebase.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('✅ Service Worker Registered on Login', reg.scope))
                    .catch(err => console.warn('⚠️ SW Failed', err));
            });
        }
    </script>
</head>
<body class="auth-body" data-theme="light">

    <div class="animated-bg"></div>

    <div class="auth-container glass-panel">
        <div class="auth-header">
            <div class="auth-logo"><i class="fas fa-shield-alt"></i></div>
            <h2 style="color: var(--text-main); margin: 0; font-weight: 800;">Safe<span style="color: var(--primary);">Nav</span></h2>
            <p style="color: var(--text-muted); margin-top: 5px;">Secure Travel Ecosystem</p>
        </div>

        <form id="loginForm" class="travel-form">
            <div class="form-group floating-group">
                <input type="email" id="loginEmail" class="floating-input" placeholder=" " required>
                <label for="loginEmail" class="floating-label"><i class="fas fa-envelope"></i> Email Address</label>
            </div>
            
            <div class="form-group floating-group">
                <input type="password" id="loginPassword" class="floating-input" placeholder=" " required>
                <label for="loginPassword" class="floating-label"><i class="fas fa-lock"></i> Password</label>
            </div>

            <button type="submit" class="generate-btn shimmer-btn" style="margin-top: 10px;" id="loginBtn">
                <span class="btn-content"><span>Sign In</span> <i class="fas fa-arrow-right"></i></span>
                <div class="shimmer"></div>
            </button>

            <p class="toggle-text">Don't have an account? <a href="signup.html" class="toggle-link">Create one</a></p>
        </form>

        <div id="authMessage" class="auth-message"></div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
