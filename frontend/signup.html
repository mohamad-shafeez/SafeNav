<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | SafeNav</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/planner.css">
    <link rel="stylesheet" href="css/auth.css">

   <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js">
      
    </script> <script src="js/firebase.js"></script>
</head>
<body class="auth-body" data-theme="light">

    <div class="animated-bg"></div>

    <div class="auth-container glass-panel">
        <div class="auth-header">
            <div class="auth-logo"><i class="fas fa-user-plus"></i></div>
            <h2 style="color: var(--text-main); margin: 0; font-weight: 800;">Join Safe<span style="color: var(--primary);">Nav</span></h2>
            <p style="color: var(--text-muted); margin-top: 5px;">Start your secure journey</p>
        </div>

        <form id="signupForm" class="travel-form">
            <div class="form-group floating-group">
                <input type="text" id="signupName" class="floating-input" placeholder=" " required>
                <label for="signupName" class="floating-label"><i class="fas fa-user"></i> Full Name</label>
            </div>

            <div class="form-group floating-group">
                <input type="email" id="signupEmail" class="floating-input" placeholder=" " required>
                <label for="signupEmail" class="floating-label"><i class="fas fa-envelope"></i> Email Address</label>
            </div>
            
            <div class="form-group floating-group">
                <input type="password" id="signupPassword" class="floating-input" placeholder=" " required>
                <label for="signupPassword" class="floating-label"><i class="fas fa-lock"></i> Create Password</label>
            </div>

            <button type="submit" class="generate-btn shimmer-btn" style="margin-top: 10px;" id="signupBtn">
                <span class="btn-content"><span>Create Account</span> <i class="fas fa-check"></i></span>
                <div class="shimmer"></div>
            </button>

            <p class="toggle-text">Already have an account? <a href="login.html" class="toggle-link">Sign In</a></p>
        </form>

        <div id="authMessage" class="auth-message"></div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
