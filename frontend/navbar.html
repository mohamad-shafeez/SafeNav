<style>
    /* ===========================
       NAVBAR CSS (EMBEDDED)
       =========================== */
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

    /* Variables */
    :root {
        --nav-bg: rgba(28, 60, 114, 0.85); /* Navy Glass */
        --nav-text: #ffffff;
        --nav-hover: #38bdf8; /* Light Blue */
        --nav-accent: #ffd700; /* Gold */
    }

    /* Reset for Navbar */
    .premium-navbar * {
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    /* Main Bar */
    .premium-navbar {
        width: 100%;
        position: sticky;
        top: 0;
        z-index: 9999;
        background: var(--nav-bg);
        backdrop-filter: blur(12px); /* Glass Effect */
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .nav-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0.8rem 1.2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    /* Logo */
    .nav-logo {
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        color: var(--nav-text);
        font-size: 1.4rem;
        font-weight: 700;
        letter-spacing: 0.5px;
    }
    .nav-logo .logo-icon { font-size: 1.6rem; }
    .nav-logo .highlight { color: var(--nav-hover); }

    /* Menu (Desktop) */
    .nav-menu {
        display: flex;
        align-items: center;
        gap: 2rem;
    }

    .nav-list {
        display: flex;
        gap: 1.5rem;
        list-style: none;
        margin: 0;
        padding: 0;
    }

    /* Links */
    .nav-link {
        color: rgba(255,255,255,0.9);
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 500;
        padding: 5px 0;
        position: relative;
        transition: color 0.3s ease;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .nav-link .icon { font-size: 1.1rem; }

    .nav-link:hover, .nav-link.active-page {
        color: var(--nav-hover);
    }

    /* Animated Underline */
    .nav-link::after {
        content: '';
        position: absolute;
        width: 0;
        height: 2px;
        bottom: 0;
        left: 0;
        background-color: var(--nav-hover);
        transition: width 0.3s ease;
    }
    .nav-link:hover::after, .nav-link.active-page::after {
        width: 100%;
    }

    /* Actions */
    .nav-actions {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    /* Theme Button */
    .icon-btn {
        background: rgba(255,255,255,0.1);
        border: none;
        color: var(--nav-text);
        font-size: 1.2rem;
        cursor: pointer;
        padding: 6px;
        border-radius: 50%;
        transition: 0.3s;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.2); transform: rotate(15deg); }

    /* Logout Button */
    .logout-btn {
        background: #ef4444;
        color: white;
        border: none;
        padding: 8px 18px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
    }
    .logout-btn:hover {
        background: #dc2626;
        transform: translateY(-2px);
    }

    /* Mobile Hamburger */
    .nav-toggle {
        display: none;
        flex-direction: column;
        cursor: pointer;
        gap: 5px;
    }
    .bar {
        width: 25px;
        height: 3px;
        background-color: white;
        border-radius: 3px;
        transition: 0.3s;
    }

    /* ===========================
       RESPONSIVE (MOBILE)
       =========================== */
    @media (max-width: 900px) {
        .nav-toggle { display: flex; }

        .nav-menu {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: rgba(20, 40, 80, 0.98);
            backdrop-filter: blur(15px);
            flex-direction: column;
            padding: 20px;
            gap: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            
            /* Hidden by default */
            display: none; 
            animation: slideDown 0.3s ease forwards;
        }

        .nav-menu.active { display: flex; }

        .nav-list {
            flex-direction: column;
            width: 100%;
            text-align: center;
            gap: 15px;
        }

        .nav-link {
            justify-content: center;
            font-size: 1.1rem;
            padding: 10px;
        }

        .nav-actions {
            flex-direction: column;
            width: 100%;
            gap: 15px;
            margin-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }
        
        .logout-btn { width: 100%; }
    }

    @keyframes slideDown {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<script>
    // Mobile Toggle Logic
    const toggle = document.getElementById('navbarToggle');
    const menu = document.getElementById('navMenu');

    if(toggle && menu) {
        toggle.addEventListener('click', () => {
            menu.classList.toggle('active');
        });
    }

    // Active Page Highlight
    const current = window.location.pathname.split('/').pop();
    document.querySelectorAll('.nav-link').forEach(link => {
        if(link.getAttribute('href') === current) {
            link.classList.add('active-page');
        }
    });

    // Logout connection is handled by global auth.js, 
    // but ensure ID matches 'logoutBtn'
</script>
