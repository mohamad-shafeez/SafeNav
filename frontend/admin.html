<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SafeNav Command Center | GOD MODE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase.js"></script>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --bg: #0b1121; --card: #151e32; --text: #e2e8f0; --accent: #0ea5e9; --danger: #ef4444; --success: #22c55e; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Command */
        .sidebar { width: 280px; background: var(--card); border-right: 1px solid #1e293b; display: flex; flex-direction: column; padding: 20px; z-index: 10; }
        .brand { font-size: 1.4rem; font-weight: 800; color: var(--accent); margin-bottom: 40px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .menu-item { padding: 15px; margin: 5px 0; border-radius: 8px; cursor: pointer; color: #94a3b8; transition: 0.3s; font-weight: 600; display: flex; align-items: center; gap: 12px; }
        .menu-item:hover, .menu-item.active { background: rgba(14, 165, 233, 0.1); color: var(--accent); border-left: 3px solid var(--accent); }
        
        /* Main Operations */
        .main { flex: 1; position: relative; display: flex; flex-direction: column; }
        
        /* Tactical Map Layer */
        #tacticalMap { flex: 1; width: 100%; height: 100%; background: #0f172a; }
        .map-overlay { position: absolute; top: 20px; left: 20px; z-index: 999; background: rgba(15, 23, 42, 0.9); padding: 15px; border-radius: 12px; border: 1px solid #334155; backdrop-filter: blur(10px); width: 300px; }
        
        /* 🔥 NEW: BROADCAST CONTROL PANEL (Bottom Center) */
        .broadcast-panel {
            position: absolute; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 1000; 
            width: 90%; 
            max-width: 600px;
            background: rgba(30, 41, 59, 0.95); 
            backdrop-filter: blur(10px);
            border: 1px solid #3b82f6;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }

        .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; }
        .stat-val { font-weight: bold; color: var(--accent); }

        /* User Markers Custom Style */
        .admin-marker { background: var(--accent); border: 2px solid white; border-radius: 50%; width: 12px; height: 12px; box-shadow: 0 0 10px var(--accent); }
        .admin-marker.offline { background: #64748b; box-shadow: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand"><i class="fas fa-satellite-dish"></i> SafeNav OPS</div>
        
        <div class="menu-item active" onclick="switchView('map')"><i class="fas fa-globe-asia"></i> Live Tactical Map</div>
        <div class="menu-item" onclick="switchView('users')"><i class="fas fa-users"></i> User Database</div>
        <div class="menu-item" onclick="switchView('ai')"><i class="fas fa-brain"></i> AI Model Training</div>
        <div class="menu-item" onclick="switchView('settings')"><i class="fas fa-cogs"></i> System Controls</div>
        
        <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid #1e293b;">
            <div style="font-size: 0.8rem; color: #64748b; margin-bottom: 10px;">SYSTEM STATUS</div>
            <div style="display: flex; align-items: center; gap: 8px; color: var(--success); font-weight: bold;">
                <span style="width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 8px var(--success);"></span> ONLINE
            </div>
        </div>
        <div class="menu-item" style="color: var(--danger);" onclick="logout()"><i class="fas fa-power-off"></i> Terminate Session</div>
    </div>

    <div class="main">
        
        <div class="map-overlay">
            <h3 style="margin-bottom: 15px; border-bottom: 1px solid #334155; padding-bottom: 10px;">Network Status</h3>
            <div class="stat-row"><span>Active Units:</span> <span class="stat-val" id="activeCount">0</span></div>
            <div class="stat-row"><span>Total Database:</span> <span class="stat-val" id="totalCount">0</span></div>
            <div class="stat-row"><span>Data Stream:</span> <span class="stat-val" style="color: var(--success);">LIVE</span></div>
            <div style="margin-top: 10px; font-size: 0.8rem; color: #64748b;">Scanning frequency: 2000ms</div>
        </div>

        <div class="broadcast-panel">
            <h3 style="color: #3b82f6; margin-bottom: 10px; font-size: 1.1rem; display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-bullhorn"></i> Global Emergency Broadcast
            </h3>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="adminMessage" placeholder="Type alert (e.g., '⚠️ Heavy Fog in Sector 4 - Slow Down')" style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; outline: none;">
                <button onclick="sendGlobalAlert()" style="background: #ef4444; color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; white-space: nowrap;">
                    SEND ALERT 🚨
                </button>
            </div>
        </div>

        <div id="tacticalMap"></div>
    </div>

    <script>
        const db = firebase.firestore();
        let map;
        let userMarkers = {};
        const AUTHORIZED_ADMINS = ["shafeezchappi18@gmail.com", "admin@safenav.com"];

        // 1. INITIALIZE SYSTEM
        document.addEventListener("DOMContentLoaded", () => {
            initTacticalMap();
            verifyAdmin();
        });

        function verifyAdmin() {
            firebase.auth().onAuthStateChanged(user => {
                if (!user || !AUTHORIZED_ADMINS.includes(user.email)) {
                    alert("⛔ UNAUTHORIZED ACCESS DETECTED");
                    window.location.href = "login.html";
                } else {
                    startScanning();
                }
            });
        }
        
        // 2. TACTICAL MAP ENGINE
        function initTacticalMap() {
            map = L.map('tacticalMap').setView([20.5937, 78.9629], 5); // India Center
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);
        }

        // 3. REAL-TIME SCANNING
        function startScanning() {
            console.log("📡 Establishing Data Link...");
            
            db.collection("users").onSnapshot((snapshot) => {
                let active = 0;
                let total = 0;

                snapshot.forEach((doc) => {
                    total++;
                    const data = doc.data();
                    
                    if (data.location && data.location.latitude) {
                        updateUserOnMap(doc.id, data);
                        
                        // Check if "Active" (seen in last 5 mins)
                        const lastSeen = data.lastSeen ? data.lastSeen.toDate() : new Date(0);
                        const minsAgo = (Date.now() - lastSeen) / 60000;
                        if (minsAgo < 5) active++;
                    }
                });

                document.getElementById('activeCount').textContent = active;
                document.getElementById('totalCount').textContent = total;
            });
        }

        // 4. MARKER MANAGEMENT
        function updateUserOnMap(uid, data) {
            const lat = data.location.latitude;
            const lng = data.location.longitude;
            const isOnline = (Date.now() - (data.lastSeen?.toDate() || 0)) < 300000;

            const iconColor = isOnline ? '#0ea5e9' : '#64748b';
            
            const customIcon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div style="background-color:${iconColor}; width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 10px ${iconColor};"></div>`,
                iconSize: [15, 15],
                iconAnchor: [7, 7]
            });

            if (userMarkers[uid]) {
                userMarkers[uid].setLatLng([lat, lng]);
                userMarkers[uid].setIcon(customIcon);
                userMarkers[uid].bindPopup(`
                    <b>User:</b> ${data.email}<br>
                    <b>Speed:</b> ${data.speed || 0} km/h<br>
                    <b>Status:</b> ${isOnline ? '🟢 Live' : '⚫ Offline'}
                `);
             } else { 
                const marker = L.marker([lat, lng], { icon: customIcon }).addTo(map);
                marker.bindPopup(`<b>User:</b> ${data.email}<br><b>Status:</b> Syncing...`);
                userMarkers[uid] = marker;
            }
        }

        // 🔥 NEW: BROADCAST ALERT FUNCTION
        function sendGlobalAlert() {
            const msg = document.getElementById('adminMessage').value;
            if(!msg) return;
            
            // Visual Feedback
            const btn = document.querySelector('button[onclick="sendGlobalAlert()"]');
            const originalText = btn.innerText;
            btn.innerText = "SENDING...";
            
            // Write to a special 'system_alerts' collection in Database
            db.collection('system_alerts').add({
                message: msg,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                type: 'critical'
            }).then(() => {
                alert("🚨 ALERT SENT TO ALL DRIVERS!");
                document.getElementById('adminMessage').value = "";
                btn.innerText = originalText;
            }).catch(err => {
                alert("Error sending alert: " + err.message);
                btn.innerText = originalText;
            });
        }

        function logout() {
            firebase.auth().signOut().then(() => window.location.href = "login.html");
        }
    </script>
</body>
</html>
